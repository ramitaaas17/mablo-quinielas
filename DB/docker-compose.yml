version: '3.9'

services:
  db:
    image: postgres:16
    container_name: Mablo_Quiniela_pstg_db
    restart: always
    environment:
      POSTGRES_USER: Usercito
      POSTGRES_PASSWORD: Passita
      POSTGRES_DB: Quinielas
    ports:
      - "5432:5432"
    volumes:
    - data:/var/lib/postgresql/data
    - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

volumes:
  data:

